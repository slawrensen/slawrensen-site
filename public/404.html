<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>No signal — slawrensen</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#08090b">
<meta name="color-scheme" content="dark">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{
    --bg:#08090b; --text:#e9ebf0; --muted:#a3abb8; --faint:#7b8493;
    --accent:#5cb8ff; --accent-2:#8f7cff; --line-2:#222835;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono","Cascadia Code","JetBrains Mono",Consolas,ui-monospace,monospace;
    color-scheme:dark;
  }
  *{box-sizing:border-box; margin:0}
  a{color:inherit; text-decoration:none}
  body{
    min-height:100svh; display:grid; place-items:center; padding:32px;
    background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.65;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image:radial-gradient(rgba(150,170,205,.05) 1px, transparent 1.5px);
    background-size:44px 44px;
    -webkit-mask-image:linear-gradient(#000, transparent 80%);
            mask-image:linear-gradient(#000, transparent 80%);
  }
  main{max-width:44ch}
  .eyebrow{
    display:inline-flex; align-items:center; gap:10px; color:var(--accent);
    font-family:var(--mono); font-size:.72rem; letter-spacing:.2em; text-transform:uppercase;
  }
  .eyebrow::before{content:""; width:22px; height:1px; background:currentColor; opacity:.55}
  h1{font-size:clamp(1.7rem,1.2rem + 2vw,2.4rem); line-height:1.12; letter-spacing:-.02em; margin-top:.5em; font-weight:600; text-wrap:balance}
  p{color:var(--muted); margin-top:14px}
  a.home{
    display:inline-flex; align-items:center; gap:9px; margin-top:28px; height:46px; padding:0 20px;
    border:1px solid var(--line-2); border-radius:12px; color:var(--text); text-decoration:none;
    font-weight:600; font-size:.95rem;
  }
  a.home:hover{border-color:#39424f}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:8px}
  .brand{display:flex; width:max-content; align-items:center; gap:11px; margin-bottom:30px; font-weight:600}
  .mark{
    width:30px; height:30px; border-radius:9px; display:grid; place-items:center;
    background:linear-gradient(115deg,var(--accent),var(--accent-2));
    color:#05070a; font-family:var(--mono); font-weight:800; font-size:.82rem;
  }
</style>
</head>
<body>
<main>
  <a class="brand" href="/"><span class="mark" aria-hidden="true">SL</span><span>slawrensen</span></a>
  <p class="eyebrow">404 · No signal</p>
  <h1>That page is not on this instrument.</h1>
  <p>The address does not match anything here. The sensor wall is one page — everything lives on the front.</p>
  <a class="home" href="/">Back to slawrensen.com</a>
</main>
</body>
</html>
